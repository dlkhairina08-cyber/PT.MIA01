        // --- KOMPONEN CUSTOM DIALOG / ALERTS ---
        const CustomAlert = ({ message, onClose, type = 'success' }) => (
            <div className="fixed inset-0 flex items-center justify-center z-[999] px-4 animate-fade-in">

                    <div className="grid grid-cols-2 gap-3">

                        </button>
                        <button onClick={onConfirm} className="bg-gradient-gold text-dark-400 font-bold py-2 rounded-lg hover:shadow-[0_0_15px_rgba(212,175,55,0.3)] transition-all">

        // --- REUSABLE INPUT ---
        const Input = ({ label, type = 'text', name, value, onChange, placeholder, required = false, options = [], rows = 3 }) => {
            const inputClass = "w-full bg-dark-300 border border-gold-500/20 rounded-lg py-2.5 px-4 text-white placeholder-gray-500 focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-all font-sans text-sm";

                    ) : type === 'select' ? (

                            ))}

                    )}

        // --- COMPONENT: ADVANCED FILE UPLOAD (MURNI FILE MANAGER / NO CAMERA) ---
        const ImageUpload = ({ onImageSelected, currentImage, label = "Pilih Gambar" }) => {
            const [dragActive, setDragActive] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);

            const handleFile = (file) => {
                if (!file) return;
                
                const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];
                if (!allowedTypes.includes(file.type)) {
                    alert('Hanya file JPG, PNG, atau WEBP yang diperbolehkan.');
                    return;
                }

                if (file.size > 10 * 1024 * 1024) {
                    alert('Ukuran file maksimal adalah 10MB.');
                    return;
                }

                setIsUploading(true);
                setUploadProgress(10);

                const reader = new FileReader();
                reader.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 60) + 10;
                        setUploadProgress(percent);
                    }
                };

                reader.onloadend = () => {
                    const img = new Image();
                    img.src = reader.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        const maxDim = 1200;
                        let width = img.width;
                        let height = img.height;
                        if (width > maxDim || height > maxDim) {
                            if (width > height) {
                                height = Math.round((height * maxDim) / width);
                                width = maxDim;
                            } else {
                                width = Math.round((width * maxDim) / height);
                                height = maxDim;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        setUploadProgress(100);
                        setTimeout(() => {
                            onImageSelected(compressedBase64);
                            setIsUploading(false);
                            setUploadProgress(0);
                        }, 400);
                    };
                };
                reader.readAsDataURL(file);
            };

            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === "dragenter" || e.type === "dragover") {
                    setDragActive(true);
                } else if (e.type === "dragleave") {
                    setDragActive(false);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    handleFile(e.dataTransfer.files[0]);
                }
            };

            const handleChange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    handleFile(e.target.files[0]);
                }
            };

            return (
                <div 
                    onDragEnter={handleDrag}
                    onDragOver={handleDrag}
                    onDragLeave={handleDrag}
                    onDrop={handleDrop}
                    className={`w-full bg-dark-300 border-2 border-dashed rounded-xl p-4 transition-all flex flex-col items-center justify-center text-center relative ${
                        dragActive ? 'border-gold-500 bg-gold-500/5' : 'border-gold-500/20 hover:border-gold-500/40'
                    }`}
                >
                    {currentImage ? (
                        <div className="relative w-full h-32 mb-3 group rounded-lg overflow-hidden border border-gold-500/10">
                            <img src={currentImage} alt="Preview Gambar" className="w-full h-full object-cover" />
                            <div className="absolute inset-0 bg-black/75 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-2">
                                <span className="text-[10px] bg-gold-500/25 px-2 py-0.5 rounded font-bold text-gold-300 uppercase tracking-widest">Preview Gambar</span>
                                <div className="flex gap-2">
                                    <button 
                                        type="button"
                                        onClick={() => fileInputRef.current.click()}
                                        className="bg-gold-500 text-dark-400 py-1.5 px-3 rounded text-xs font-bold hover:scale-105 transition-transform flex items-center gap-1"
                                        title="Ganti Gambar"
                                    >
                                        <i className="fas fa-sync-alt"></i> Ganti Gambar
                                    </button>
                                    <button 
                                        type="button"
                                        onClick={() => onImageSelected(null)}
                                        className="bg-red-500 text-white py-1.5 px-3 rounded text-xs font-bold hover:scale-105 transition-transform flex items-center gap-1"
                                        title="Hapus Gambar"
                                    >
                                        <i className="fas fa-trash-alt"></i> Hapus Gambar
                                    </button>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="py-4 space-y-2 pointer-events-none">
                            <i className="fas fa-cloud-upload-alt text-3xl text-gold-500/60"></i>
                            <p className="text-xs text-gray-400 font-sans">
                                Drag & Drop File, atau gunakan tombol di bawah
                            </p>
                            <p className="text-[10px] text-gray-500">Mendukung file JPG, PNG, WEBP (Maks 10MB)</p>
                        </div>
                    )}

                    {isUploading && (
                        <div className="absolute inset-0 bg-dark-400/90 flex flex-col items-center justify-center rounded-xl px-4 space-y-2">
                            <div className="w-full bg-dark-300 h-1.5 rounded-full overflow-hidden">
                                <div className="bg-gradient-gold h-full animate-pulse" style={{ width: `${uploadProgress}%` }}></div>
                            </div>
                            <span className="text-[10px] text-gold-500 uppercase tracking-widest font-semibold">Mengompres & Mengunggah...</span>
                        </div>
                    )}

                    <input 
                        ref={fileInputRef}
                        type="file" 
                        accept="image/*"
                        multiple={false}
                        onChange={handleChange}
                        className="hidden" 
                    />
                    
                    {!currentImage && !isUploading && (
                        <div className="flex flex-col sm:flex-row gap-2 mt-2 w-full justify-center">
                            <button 
                                type="button"
                                onClick={() => fileInputRef.current.click()}
                                className="bg-gold-500/10 hover:bg-gradient-gold text-gold-500 hover:text-dark-400 font-bold px-4 py-2 rounded-lg text-[10px] uppercase tracking-wider transition-all flex items-center justify-center gap-1"
                            >
                                <i className="fas fa-folder-open"></i> Pilih dari File
                            </button>
                            <button 
                                type="button"
                                onClick={() => fileInputRef.current.click()}
                                className="bg-gold-500/10 hover:bg-gradient-gold text-gold-500 hover:text-dark-400 font-bold px-4 py-2 rounded-lg text-[10px] uppercase tracking-wider transition-all flex items-center justify-center gap-1"
                            >
                                <i className="fas fa-images"></i> Pilih dari Galeri
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- SUB-COMPONENT: INTERACTIVE SOCIAL MEDIA BUTTON WITH TOOLTIP ---

                    {showTooltip && (

        // --- SUB-COMPONENT: DYNAMIC BRANDING LOGO & TEXT ---
        const BrandingLogoText = ({ logo, textSpacing, logoSize, brandStyle, brandColor, customFont, customSize }) => {
            const fontClass = customFont === 'sans' ? 'font-sans' : 'font-serif';
            
            const getPresetClasses = () => {
                switch (brandStyle) {
                    case 'white':
                        return 'text-white font-sans font-semibold tracking-wide';
                    case 'serif':
                        return 'text-gold-500 font-serif font-bold tracking-wider';
                    case 'clean':
                        return 'text-gray-300 font-sans font-light uppercase tracking-widest';
                    case 'gold':
                    default:
                        return 'text-gradient-gold font-serif font-bold tracking-wide';
                }
            };

            const inlineStyle = {
                color: (brandStyle !== 'gold' && brandColor) ? brandColor : undefined,
                fontSize: customSize || '1.25rem',
            };

            return (
                <div className="flex items-center" style={{ gap: `${textSpacing || 8}px` }}>
                    {logo && (
                        <img 
                            src={logo} 
                            alt="Logo PT.MIA" 
                            style={{ 
                                height: `${logoSize || 32}px`, 
                                width: 'auto', 
                                objectFit: 'contain' 
                            }} 
                            className="max-w-[120px] transition-all duration-300"
                        />
                    )}
                    <span 
                        className={`leading-none select-none transition-all duration-300 ${fontClass} ${getPresetClasses()}`} 
                        style={inlineStyle}
                    >
                        PT.MIA
                    </span>
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            // State global untuk data dan konfigurasi website
            const [appState, setAppState] = useState(() => {
                const saved = localStorage.getItem('pt_mia_state_v4_complete');
                if (saved) {
                    try { 
                        const parsed = JSON.parse(saved);
                        if (!parsed.socials) parsed.socials = DEFAULT_SOCIALS;
                        if (!parsed.adminPassword) parsed.adminPassword = 'Lihat Lihat';
                        if (!parsed.complexImages) parsed.complexImages = DEFAULT_COMPLEX_IMAGES;
                        if (!parsed.facilities) parsed.facilities = DEFAULT_FACILITIES;
                        
                        // Setel branding default jika belum ada
                        if (parsed.brandingStyle === undefined) parsed.brandingStyle = 'gold';
                        if (parsed.brandingFont === undefined) parsed.brandingFont = 'serif';
                        if (parsed.brandingColor === undefined) parsed.brandingColor = '#D4AF37';
                        if (parsed.brandingSize === undefined) parsed.brandingSize = '1.35rem';
                        if (parsed.brandingLogoSize === undefined) parsed.brandingLogoSize = 36;
                        if (parsed.brandingSpacing === undefined) parsed.brandingSpacing = 8;

                        return parsed; 
                    } catch (e) { console.error(e); }
                }
                return {
                    logo: null, 
                    adminPassword: 'Lihat Lihat', 
                    companyName: 'PT.MIA',
                    slogan: 'Hunian Elegan untuk Masa Depan Anda',
                    heroImage: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1600&q=80',
                    aboutTitle: 'Membangun Integritas, Menghadirkan Kemewahan',
                    aboutDesc: 'PT.MIA adalah perusahaan pengembang properti terkemuka yang berdedikasi tinggi untuk menghadirkan mahakarya arsitektur modern berkelas premium. Kami melayani kebutuhan hunian ideal dengan standardisasi mutu internasional.',
                    aboutVisi: 'Menjadi developer perumahan premium nomor satu di Indonesia yang mengutamakan kualitas, estetika mewah, dan ramah lingkungan.',
                    aboutMisi: 'Menyediakan hunian mewah berkualitas prima dengan struktur kokoh, mengintegrasikan sistem pintar ramah lingkungan, serta menjamin nilai investasi berlipat ganda untuk konsumen.',
                    aboutSejarah: 'Didirikan sejak tahun 2018 di Kalimantan Barat, PT.MIA telah sukses merancang dan menyelesaikan pembangunan 15 kawasan perumahan eksklusif bernilai tinggi.',
                    aboutImage: 'https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?auto=format&fit=crop&w=1200&q=80',
                    aboutProjectImg: 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=1200&q=80',
                    aboutOfficeImg: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1200&q=80',
                    designs: DEFAULT_DESIGNS,
                    houses: DEFAULT_HOUSES,
                    socials: DEFAULT_SOCIALS,
                    complexImages: DEFAULT_COMPLEX_IMAGES,
                    facilities: DEFAULT_FACILITIES,
                    mediaGallery: [], 
                    
                    // Branding default
                    brandingStyle: 'gold',
                    brandingFont: 'serif',
                    brandingColor: '#D4AF37',
                    brandingSize: '1.35rem',
                    brandingLogoSize: 36,
                    brandingSpacing: 8,

                    contactWhatsApp: '082148555545',
                    contactEmail: 'ptmia0109@gmail.com',
                    contactAddress: 'Jl. P3DT dusun Mekarsari (samping stadion Raden Temanggung), Desa Paal, Nanga Pinoh, Kab. Melawi, Kalimantan Barat',
                    contactHours: 'Senin - Sabtu: 08:00 - 17:00 WIB',
                    contactTitle: 'Hubungi Kami',
                    contactSubtitle: 'Konsultasikan Masa Depan Anda',
                    contactBg: null,
                    contactBanner: null,
                    contactMapsUrl: 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15959.088656157582!2d111.69612349999999!3d-0.34212349999999997!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e022f4b5952f44b%3A0xc64ef72bbcf0b62e!2sNanga%20Pinoh%2C%20Melawi%20Regency%2C%20West%20Kalimantan!5e0!3m2!1sen!2sid!4v1700000000000!5m2!1sen!2sid',
                    contactMapsEnabled: true,
                    contactMapsHeight: '240',
                    contactFormEnabled: true,
                    contactFormNamePlaceholder: 'Nama Lengkap',
                    contactFormPhonePlaceholder: 'No. Telepon / WA',
                    contactFormMsgPlaceholder: 'Tulis rincian pesan konsultasi Anda...',
                    contactFormBtnText: 'Kirim Form Konsultasi',
                    contactFormBtnColor: '#D4AF37', 
                    contactCustomFields: [] 
                };
            });

            // Sinkronisasi data ke LocalStorage
            useEffect(() => {
                localStorage.setItem('pt_mia_state_v4_complete', JSON.stringify(appState));
            }, [appState]);

            // State transaksi / request konsumen
            const [requests, setRequests] = useState(() => {
                const saved = localStorage.getItem('pt_mia_requests_v4_new');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('pt_mia_requests_v4_new', JSON.stringify(requests));
            }, [requests]);

            // State session konsumen
            const [userSession, setUserSession] = useState(() => {
                const saved = localStorage.getItem('pt_mia_session_v4_new');
                return saved ? JSON.parse(saved) : null;
            });

            useEffect(() => {
                if (userSession) {
                    localStorage.setItem('pt_mia_session_v4_new', JSON.stringify(userSession));
                } else {
                    localStorage.removeItem('pt_mia_session_v4_new');
                }
            }, [userSession]);

            // State navigasi / tampilan
            const [view, setView] = useState('home'); 
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminPasswordInput, setAdminPasswordInput] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [dashboardTab, setDashboardTab] = useState('requests');
            
            // Modal Alert & Confirm
            const [modal, setModal] = useState(null);
            const [confirmPopup, setConfirmPopup] = useState(null);

            // State Configurator Konsumen
            const [selectedHouse, setSelectedHouse] = useState(null);
            const [roomConfig, setRoomConfig] = useState({
                bedroomQty: 2,
                bathroomQty: 1,
                extraRooms: [], 
            });
            const [selectedRoomCategory, setSelectedRoomCategory] = useState(null); 
            const [roomSlotSelections, setRoomSlotSelections] = useState({}); 
            
            // State Simulasi AI & Referensi Operator
            const [aiImageInput, setAiImageInput] = useState(null);
            const [aiStyle, setAiStyle] = useState('Modern minimalis');
            const [aiNote, setAiNote] = useState('');
            const [aiResult, setAiResult] = useState(null);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [opDesignNote, setOpDesignNote] = useState('');
            const [opDesignImage, setOpDesignImage] = useState(null);

            // Helpers Alert/Confirm
            const triggerAlert = (message, type = 'success') => {
                setModal({ message, type });
            };

            const triggerConfirm = (message, onConfirm) => {
                setConfirmPopup({
                    message,
                    onConfirm: () => {
                        onConfirm();
                        setConfirmPopup(null);
                    },
                    onCancel: () => setConfirmPopup(null)
                });
            };

            // Login Operator
            const handleAdminLogin = (e) => {
                e.preventDefault();
                const currentPassword = appState.adminPassword || 'Lihat Lihat';
                if (adminPasswordInput === currentPassword) {
                    setIsAdmin(true);
                    setView('admin-dashboard');
                    triggerAlert('Akses operator berhasil dibuka. Selamat datang!');
                } else {
                    triggerAlert('Password operator salah', 'error');
                }
            };

            const handleLogout = () => {
                setIsAdmin(false);
                setView('home');
                setAdminPasswordInput('');
            };

            // Register Data Diri Konsumen
            const handleConsumerRegister = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const name = formData.get('userName');
                const wa = formData.get('userPhone');

                if (!name || !name.trim()) {
                    triggerAlert('Nama tidak boleh kosong', 'error');
                    return;
                }
                if (!/^\d+$/.test(wa)) {
                    triggerAlert('Nomor telepon wajib berupa angka', 'error');
                    return;
                }
                if (wa.length < 10) {
                    triggerAlert('Nomor telepon minimal 10 digit', 'error');
                    return;
                }

                setUserSession({ name, phone: wa });
                triggerAlert('Data diri berhasil diverifikasi. Anda sekarang dapat melanjutkan konfigurasi.');
            };

            // Mendapatkan Slot Ruangan Wajib Berdasarkan Kebutuhan
            const getRequiredSlots = () => {
                const slots = [];
                // Bedroom
                for (let i = 1; i <= roomConfig.bedroomQty; i++) {
                    slots.push({ id: `bedroom-${i}`, label: `Kamar Tidur ${i}`, category: 'kamar-tidur' });
                }
                // Bathroom
                for (let i = 1; i <= roomConfig.bathroomQty; i++) {
                    slots.push({ id: `bathroom-${i}`, label: `Kamar Mandi ${i}`, category: 'kamar-mandi' });
                }
                // Fixed Rooms
                slots.push({ id: 'dapur-1', label: 'Dapur', category: 'dapur' });
                slots.push({ id: 'ruang-tamu-1', label: 'Ruang Tamu', category: 'ruang-tamu' });
                slots.push({ id: 'ruang-keluarga-1', label: 'Ruang Keluarga', category: 'ruang-keluarga' });

                // Extra Rooms
                roomConfig.extraRooms.forEach((er, idx) => {
                    slots.push({ id: `extra-${idx}`, label: er.name, category: 'ruangan-tambahan', extraRef: er });
                });

                return slots;
            };

            const slots = getRequiredSlots();
            const totalSlots = slots.length;
            const filledSlotsCount = slots.filter(s => roomSlotSelections[s.id]).length;
            const progressPercent = totalSlots > 0 ? Math.round((filledSlotsCount / totalSlots) * 100) : 0;

            // Memilih Desain untuk Slot Spesifik
            const selectDesignForSlot = (slotId, designObj) => {
                setRoomSlotSelections(prev => {
                    const newSelections = { ...prev, [slotId]: designObj };
                    const nextFilledCount = Object.keys(newSelections).filter(k => slots.some(s => s.id === k)).length;
                    if (nextFilledCount === totalSlots) {
                        triggerAlert('Semua desain ruangan telah lengkap! Silakan ajukan rencana Anda ke operator.');
                    }
                    return newSelections;
                });
            };

            // Kirim Request Akhir
            const handleSendRequest = () => {
                if (!userSession) {
                    triggerAlert('Wajib mengisi identitas WhatsApp terlebih dahulu.', 'error');
                    return;
                }
                if (progressPercent < 100) {
                    triggerAlert('Harap lengkapi semua pilihan desain sebelum mengirim.', 'error');
                    return;
                }

                const newRequest = {
                    id: 'REQ-' + Date.now(),
                    date: new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' }),
                    customerName: userSession.name,
                    customerPhone: userSession.phone,
                    houseId: selectedHouse.id,
                    houseName: selectedHouse.name,
                    spec: {
                        bedrooms: roomConfig.bedroomQty,
                        bathrooms: roomConfig.bathroomQty,
                        extraRooms: roomConfig.extraRooms
                    },
                    selections: roomSlotSelections,
                    aiDesign: aiResult,
                    operatorDesign: opDesignImage ? { image: opDesignImage, note: opDesignNote } : null,
                    status: 'Menunggu',
                    note: ''
                };

                setRequests(prev => [newRequest, ...prev]);
                triggerAlert('Request perencanaan berhasil terkirim! Tim kami akan meninjau secepatnya.');
                
                // Clean Configurator
                setRoomSlotSelections({});
                setSelectedHouse(null);
                setAiResult(null);
                setOpDesignImage(null);
                setView('home');
            };

            const cancelRequest = (reqId) => {
                triggerConfirm('Apakah Anda yakin ingin membatalkan request ini?', () => {
                    setRequests(prev => prev.map(r => r.id === reqId ? { ...r, status: 'Dibatalkan oleh Konsumen' } : r));
                    triggerAlert('Request dibatalkan.', 'error');
                });
            };

            const reorderRequest = (req) => {
                const house = appState.houses.find(h => h.id === req.houseId);
                if (!house) {
                    triggerAlert('Maaf, tipe rumah ini sudah tidak tersedia.', 'error');
                    return;
                }
                setSelectedHouse(house);
                setRoomConfig({
                    bedroomQty: req.spec.bedrooms,
                    bathroomQty: req.spec.bathrooms,
                    extraRooms: req.spec.extraRooms || []
                });
                setRoomSlotSelections(req.selections || {});
                setView('design-room');
                triggerAlert('Konfigurasi lama berhasil disiapkan. Anda dapat merombak ulang rancangan.');
            };

            // Simulasi AI Decorator
            const runAISimulator = () => {
                if (!aiImageInput) {
                    triggerAlert('Harap upload foto ruangan kosong terlebih dahulu.', 'error');
                    return;
                }
                setIsAiLoading(true);
                setTimeout(() => {
                    const styleRenders = {
                        'Modern minimalis': 'https://images.unsplash.com/photo-1616594039964-ae9021a400a0?auto=format&fit=crop&w=800&q=80',
                        'Elegant gold': 'https://images.unsplash.com/photo-1540518614846-7eded433c457?auto=format&fit=crop&w=800&q=80',
                        'Luxury brown': 'https://images.unsplash.com/photo-1620626011761-996317b69763?auto=format&fit=crop&w=800&q=80',
                        'Japandi': 'https://images.unsplash.com/photo-1598928506311-c55ded91a20c?auto=format&fit=crop&w=800&q=80',
                        'Scandinavian': 'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=800&q=80',
                        'Classic modern': 'https://images.unsplash.com/photo-1618219908412-a29a1bb7b86e?auto=format&fit=crop&w=800&q=80'
                    };
                    setAiResult({
                        before: aiImageInput,
                        after: styleRenders[aiStyle] || styleRenders['Modern minimalis'],
                        style: aiStyle,
                        note: aiNote
                    });
                    setIsAiLoading(false);
                    triggerAlert('Desain simulasi AI berhasil digenerate.');
                }, 2500);
            };

                setAppState(prev => ({ ...prev, [key]: value }));
            };

            return (
                <div className="flex flex-col min-h-screen text-gray-200">
                    {modal && <CustomAlert message={modal.message} type={modal.type} onClose={() => setModal(null)} />}

                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                                    <BrandingLogoText 
                                        logo={appState.logo}
                                        textSpacing={appState.brandingSpacing}
                                        logoSize={appState.brandingLogoSize}
                                        brandStyle={appState.brandingStyle}
                                        brandColor={appState.brandingColor}
                                        customFont={appState.brandingFont}

                                roomConfig={roomConfig}

                                onNext={() => setView('design-room')}

                        {view === 'design-room' && selectedHouse && (
                            <FullDesignSelectionView 
                                house={selectedHouse}
                                slots={slots}
                                filledSlotsCount={filledSlotsCount}
                                totalSlots={totalSlots}
                                progressPercent={progressPercent}
                                roomSlotSelections={roomSlotSelections}
                                selectDesignForSlot={selectDesignForSlot}
                                appState={appState}
                                userSession={userSession}
                                handleConsumerRegister={handleConsumerRegister}
                                handleSendRequest={handleSendRequest}

                                opDesignImage={opDesignImage}

                                setAiStyle={setAiStyle}

                                aiResult={aiResult}
                                setAiResult={setAiResult}

                                            logo={appState.logo}
                                            textSpacing={appState.brandingSpacing}

                                        {appState.slogan}

            const [newFacilityForm, setNewFacilityForm] = useState({ name: '', desc: '', image: '', icon: 'fas fa-swimming-pool', active: true });

            const [newCustomFieldName, setNewCustomFieldName] = useState('');
            const [newCustomFieldValue, setNewCustomFieldValue] = useState('');
            const [newCustomFieldIcon, setNewCustomFieldIcon] = useState('fas fa-info-circle');

            const [passwords, setPasswords] = useState({ old: '', next: '', confirm: '' });
            const [showOld, setShowOld] = useState(false);
            const [showNext, setShowNext] = useState(false);
            const [showConfirm, setShowConfirm] = useState(false);

            const handleAddToCentralGallery = (imageSrc, category) => {
                if (!imageSrc) return;
                const newMedia = {
                    id: 'MED-' + Date.now() + Math.random().toString(36).substr(2, 4),
                    src: imageSrc,
                    category: category || 'Umum',
                    favorite: false,
                    date: new Date().toLocaleDateString('id-ID')
                };
                setAppState(prev => ({
                    ...prev,
                    mediaGallery: [newMedia, ...(prev.mediaGallery || [])]
                }));
            };

            const toggleFavoriteMedia = (id) => {
                setAppState(prev => ({
                    ...prev,
                    mediaGallery: (prev.mediaGallery || []).map(m => m.id === id ? { ...m, favorite: !m.favorite } : m)
                }));
                triggerAlert('Status favorit media diperbarui.');
            };

            const deleteMediaItem = (id) => {
                setAppState(prev => ({
                    ...prev,
                    mediaGallery: (prev.mediaGallery || []).filter(m => m.id !== id)
                }));
                triggerAlert('Media dihapus.', 'error');
            };

            // --- DESIGN CMS ---
            const handleAddDesign = (e) => {
                e.preventDefault();
                if (!newDesignForm.name.trim() || !newDesignForm.image) {
                    triggerAlert('Nama desain dan foto wajib diisi!', 'error');
                    return;
                }
                const newId = 'DES-' + Date.now();
                const updated = [
                    ...appState.designs,
                    { ...newDesignForm, id: newId, category: selectedCategoryTab }
                ];
                updateCMSState('designs', updated);
                handleAddToCentralGallery(newDesignForm.image, 'Desain Ruangan');
                setNewDesignForm({ name: '', desc: '', image: '', premium: false, active: true });
                triggerAlert('Desain berhasil ditambahkan.');
            };

            const toggleDesignField = (id, field) => {
                const updated = appState.designs.map(d => d.id === id ? { ...d, [field]: !d[field] } : d);
                updateCMSState('designs', updated);
                triggerAlert(`Status ${field} desain diubah.`);
            };

            const handleDeleteDesign = (id) => {
                const updated = appState.designs.filter(d => d.id !== id);
                updateCMSState('designs', updated);
                triggerAlert('Desain berhasil dihapus.', 'error');
            };

            // --- HOUSE CMS ---
            const handleAddHouse = (e) => {
                e.preventDefault();
                if (!newHouseForm.name.trim() || !newHouseForm.image) {
                    triggerAlert('Nama tipe dan foto wajib diisi!', 'error');
                    return;
                }
                const newId = 'HOU-' + Date.now();
                const updated = [...appState.houses, { ...newHouseForm, id: newId }];
                updateCMSState('houses', updated);
                handleAddToCentralGallery(newHouseForm.image, 'Rumah');
                setNewHouseForm({ name: '', price: '', land: '', building: '', bed: 2, bath: 1, desc: '', image: '' });
                triggerAlert('Tipe rumah ditambahkan.');
            };

            const handleDeleteHouse = (id) => {
                const updated = appState.houses.filter(h => h.id !== id);
                updateCMSState('houses', updated);
                triggerAlert('Tipe rumah dihapus.', 'error');
            };

            // --- COMPLEX GALLERY CMS ---
            const handleAddComplexImg = (e) => {
                e.preventDefault();
                if (!newComplexImgForm.title.trim() || !newComplexImgForm.image) {
                    triggerAlert('Judul gambar dan foto wajib diunggah!', 'error');
                    return;
                }
                const newId = 'CIMG-' + Date.now();
                let updated = [...(appState.complexImages || [])];
                
                if (newComplexImgForm.isMain) {
                    updated = updated.map(img => ({ ...img, isMain: false }));
                }

                updated.push({ ...newComplexImgForm, id: newId });
                updateCMSState('complexImages', updated);
                handleAddToCentralGallery(newComplexImgForm.image, 'Complex');
                setNewComplexImgForm({ title: '', desc: '', image: '', category: 'Banner', active: true, isMain: false });
                triggerAlert('Gambar komplek ditambahkan.');
            };

            const toggleComplexImgField = (id, field) => {
                let updated = (appState.complexImages || []).map(img => {
                    if (img.id === id) {
                        return { ...img, [field]: !img[field] };
                    }
                    return img;
                });

                if (field === 'isMain') {
                    updated = updated.map(img => {
                        if (img.id !== id) {
                            return { ...img, isMain: false };
                        }
                        return img;
                    });
                }

                updateCMSState('complexImages', updated);
                triggerAlert('Setelan gambar diperbarui.');
            };

            const handleDeleteComplexImg = (id) => {
                const updated = (appState.complexImages || []).filter(img => img.id !== id);
                updateCMSState('complexImages', updated);
                triggerAlert('Gambar berhasil dihapus.', 'error');
            };

            // --- FACILITIES CMS ---
            const handleAddFacility = (e) => {
                e.preventDefault();
                if (!newFacilityForm.name.trim() || !newFacilityForm.image) {
                    triggerAlert('Nama fasilitas dan foto wajib diunggah!', 'error');
                    return;
                }
                const newId = 'FAC-' + Date.now();
                const updated = [...(appState.facilities || []), { ...newFacilityForm, id: newId }];
                updateCMSState('facilities', updated);
                handleAddToCentralGallery(newFacilityForm.image, 'Fasilitas');
                setNewFacilityForm({ name: '', desc: '', image: '', icon: 'fas fa-swimming-pool', active: true });
                triggerAlert('Fasilitas baru berhasil ditambahkan.');
            };

            const toggleFacilityField = (id, field) => {
                const updated = (appState.facilities || []).map(fac => fac.id === id ? { ...fac, [field]: !fac[field] } : fac);
                updateCMSState('facilities', updated);
                triggerAlert('Status fasilitas diperbarui.');
            };

            const handleDeleteFacility = (id) => {
                triggerConfirm('Apakah Anda yakin ingin menghapus fasilitas ini?', () => {
                    const updated = (appState.facilities || []).filter(fac => fac.id !== id);
                    updateCMSState('facilities', updated);
                    triggerAlert('Fasilitas berhasil dihapus.', 'error');
                });
            };

            // --- CONTACT & CUSTOM FIELDS CMS ---
            const handleAddCustomContactField = () => {
                if (!newCustomFieldName.trim() || !newCustomFieldValue.trim()) {
                    triggerAlert('Label dan Isi Informasi tidak boleh kosong!', 'error');
                    return;
                }
                const newField = {
                    id: 'FLD-' + Date.now(),
                    label: newCustomFieldName,
                    value: newCustomFieldValue,
                    icon: newCustomFieldIcon
                };
                const updatedFields = [...(appState.contactCustomFields || []), newField];
                updateCMSState('contactCustomFields', updatedFields);
                
                setNewCustomFieldName('');
                setNewCustomFieldValue('');
                setNewCustomFieldIcon('fas fa-info-circle');
                triggerAlert('Informasi kontak kustom berhasil ditambahkan.');
            };

            const handleDeleteCustomContactField = (id) => {
                const updatedFields = (appState.contactCustomFields || []).filter(f => f.id !== id);
                updateCMSState('contactCustomFields', updatedFields);
                triggerAlert('Informasi kontak kustom berhasil dihapus.', 'error');
            };

            // --- SOCIAL MEDIA CMS ---
            const handleAddOrEditSocial = (e) => {
                e.preventDefault();
                if (!newSocialForm.name.trim() || !newSocialForm.username.trim() || !newSocialForm.link.trim()) {
                    triggerAlert('Seluruh kolom data wajib diisi!', 'error');
                    return;
                }

                if (newSocialForm.active) {
                    const urlPattern = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([\/\w .-]*)*\/?$/;
                    if (!urlPattern.test(newSocialForm.link.trim())) {
                        triggerAlert('Link media sosial tidak valid.', 'error');
                        return;
                    }
                }

                if (editingSocialId) {
                    const updated = appState.socials.map(s => s.id === editingSocialId ? { ...newSocialForm, id: editingSocialId } : s);
                    updateCMSState('socials', updated);
                    setEditingSocialId(null);
                    triggerAlert('Data akun media sosial berhasil diperbarui.');
                } else {
                    const newId = 'SOC-' + Date.now();
                    const updated = [...appState.socials, { ...newSocialForm, id: newId }];
                    updateCMSState('socials', updated);
                    triggerAlert('Akun media sosial baru berhasil ditambahkan.');
                }
                setNewSocialForm({ name: '', username: '', link: '', icon: 'fab fa-instagram', style: 'gold', active: true });
            };

            const handleEditSocialClick = (soc) => {
                setEditingSocialId(soc.id);
                setNewSocialForm({
                    name: soc.name,
                    username: soc.username,
                    link: soc.link,
                    icon: soc.icon,
                    style: soc.style,
                    active: soc.active
                });
            };

            const handleDeleteSocial = (id) => {
                const updated = appState.socials.filter(s => s.id !== id);
                updateCMSState('socials', updated);
                triggerAlert('Akun media sosial dihapus.', 'error');
            };

            const toggleSocialActive = (id) => {
                const updated = appState.socials.map(s => s.id === id ? { ...s, active: !s.active } : s);
                updateCMSState('socials', updated);
                triggerAlert('Status visibilitas media sosial diperbarui.');
            };

            const moveSocialOrder = (index, direction) => {
                const nextIndex = index + direction;
                if (nextIndex < 0 || nextIndex >= appState.socials.length) return;
                
                const updated = [...appState.socials];
                const temp = updated[index];
                updated[index] = updated[nextIndex];
                updated[nextIndex] = temp;
                
                updateCMSState('socials', updated);
                triggerAlert('Urutan media sosial disesuaikan.');
            };

            // --- PASSWORD SECURITY ---
            const handlePasswordChangeSubmit = (e) => {
                e.preventDefault();
                const savedCurrentPassword = appState.adminPassword || 'Lihat Lihat';

                if (!passwords.old) {
                    triggerAlert('Password lama wajib diisi.', 'error');
                    return;
                }
                if (passwords.old !== savedCurrentPassword) {
                    triggerAlert('Password lama salah!', 'error');
                    return;
                }
                if (passwords.next.length < 6) {
                    triggerAlert('Password baru minimal 6 karakter.', 'error');
                    return;
                }
                if (passwords.next !== passwords.confirm) {
                    triggerAlert('Password konfirmasi tidak cocok.', 'error');
                    return;
                }

                updateCMSState('adminPassword', passwords.next);
                setPasswords({ old: '', next: '', confirm: '' });
                triggerAlert('Password operator berhasil diganti.');
            };

            const updateRequestStatus = (reqId, nextStatus) => {
                setRequests(prev => prev.map(r => r.id === reqId ? { ...r, status: nextStatus } : r));
                triggerAlert(`Status diperbarui ke: ${nextStatus}`);
            };

            const updateRequestNote = (reqId, noteText) => {
                setRequests(prev => prev.map(r => r.id === reqId ? { ...r, note: noteText } : r));
                triggerAlert('Catatan tanggapan berhasil disimpan.');
            };

            const displayMedia = (appState.mediaGallery || []).filter(m => {
                if (activeGalleryTab === 'Semua') return true;
                if (activeGalleryTab === 'Favorit') return m.favorite;
                return m.category === activeGalleryTab;
            });

            return (
                <div className="min-h-screen bg-dark-400 text-gray-200 font-sans flex flex-col transition-all duration-300">
                    {/* DASHBOARD HEADER */}
                    <div className="bg-dark-300 border-b border-gold-500/20 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4 z-10 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-gradient-gold p-2 rounded-lg text-dark-400">
                                <i className="fas fa-user-shield text-lg"></i>
                            </div>
                            <div>
                                <BrandingLogoText 
                                    logo={appState.logo}
                                    textSpacing={appState.brandingSpacing}
                                    logoSize={appState.brandingLogoSize}
                                    brandStyle={appState.brandingStyle}
                                    brandColor={appState.brandingColor}
                                    customFont={appState.brandingFont}
                                    customSize={appState.brandingSize}
                                />
                                <p className="text-[9px] text-gray-500 uppercase tracking-widest font-sans mt-0.5">Portal Operator CMS</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-3">
                            <span className="text-[10px] bg-gold-500/15 border border-gold-500/30 text-gold-500 py-1 px-3 rounded-full font-bold uppercase tracking-wider font-sans">
                                Admin Mode
                            </span>
                            <button 
                                onClick={handleLogout} 
                                className="bg-red-500/10 hover:bg-red-500 hover:text-white border border-red-500/20 text-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1 font-sans uppercase"
                            >
                                <i className="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col lg:flex-row min-h-0">
                        {/* RESPONSIVE DASHBOARD SIDEBAR */}
                        <aside className="w-full lg:w-64 bg-dark-300 border-b lg:border-b-0 lg:border-r border-gold-500/15 p-4 flex flex-row lg:flex-col gap-1.5 overflow-x-auto lg:overflow-x-visible hide-scrollbar shrink-0">
                            {[
                                { id: 'requests', label: 'Request Konsumen', icon: 'fa-file-invoice-dollar' },
                                { id: 'beranda', label: 'Kelola Beranda & Branding', icon: 'fa-home' },
                                { id: 'complex', label: 'Komplek & Fasilitas', icon: 'fa-map-marked-alt' },
                                { id: 'houses', label: 'Tipe Rumah', icon: 'fa-building' },
                                { id: 'tentang', label: 'Kelola Tentang', icon: 'fa-info-circle' },
                                { id: 'contact', label: 'Kelola Contact', icon: 'fa-address-book' },
                                { id: 'socials', label: 'Kelola Sosmed', icon: 'fa-share-alt' },
                                { id: 'desain', label: 'Kelola Desain', icon: 'fa-palette' },
                                { id: 'galeri-pusat', label: 'Galeri Media', icon: 'fa-images' },
                                { id: 'password-settings', label: 'Pengaturan Password', icon: 'fa-key' }
                            ].map((tab) => {
                                const isActive = dashboardTab === tab.id;
                                return (
                                    <button 
                                        key={tab.id}
                                        onClick={() => setDashboardTab(tab.id)}
                                        className={`w-auto lg:w-full px-3 py-2.5 rounded-xl text-[10px] font-bold tracking-wider font-sans uppercase transition-all flex items-center gap-2 shrink-0 border ${
                                            isActive 
                                                ? 'bg-gold-500 text-dark-400 border-gold-500 shadow-[0_0_15px_rgba(212,175,55,0.25)]' 
                                                : 'bg-transparent text-gray-400 border-transparent hover:bg-dark-200 hover:text-gold-500'
                                        }`}
                                    >
                                        <i className={`fas ${tab.icon} text-sm`}></i>
                                        <span className="whitespace-nowrap">{tab.label}</span>
                                    </button>
                                );
                            })}
                        </aside>

                        {/* WORKSPACE AREA */}
                        <main className="flex-1 p-5 md:p-8 space-y-6 overflow-y-auto max-h-[calc(100vh-80px)] min-w-0">
                            
                            {/* TAB 1: REQUEST KONSUMEN */}
                            {dashboardTab === 'requests' && (
                                <div className="space-y-6 animate-fade-in">
                                    <div className="border-b border-gold-500/15 pb-3">
                                        <h2 className="font-serif text-xl font-bold text-gold-500">Request Masuk Konsumen</h2>
                                        <p className="text-xs text-gray-400 font-sans">Tinjau seluruh data pemesanan, spesifikasi ruangan, dan saran pelanggan.</p>
                                    </div>

                                    {requests.length === 0 ? (
                                        <div className="text-center py-16 text-gray-500 text-xs font-sans">
                                            <i className="fas fa-folder-open text-3xl text-gold-500/20 mb-2 block"></i>
                                            Belum ada request data masuk.
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {requests.map(req => (
                                                <div key={req.id} className="glass-panel rounded-xl p-5 gold-border flex flex-col justify-between space-y-4">
                                                    <div className="space-y-3">
                                                        <div className="flex justify-between items-center text-[10px] border-b border-gold-500/10 pb-2 font-sans">
                                                            <span className="font-bold text-gold-500">{req.id}</span>
                                                            <span className="text-gray-500">{req.date}</span>
                                                        </div>

                                                        {/* CUSTOMER PROFILE */}
                                                        <div className="bg-dark-300 p-3 rounded-lg flex justify-between items-center font-sans">
                                                            <div>
                                                                <p className="text-xs font-bold text-white">{req.customerName}</p>
                                                                <p className="text-[10px] text-gold-500">{req.customerPhone}</p>
                                                            </div>
                                                            <a 
                                                                href={`https://wa.me/62${req.customerPhone.replace(/^0/, '')}`} 
                                                                target="_blank" 
                                                                rel="noopener noreferrer"
                                                                className="bg-green-500/20 text-green-400 hover:bg-green-500 hover:text-white px-2.5 py-1 rounded text-[10px] font-bold transition-all uppercase tracking-wider"
                                                            >
                                                                WhatsApp
                                                            </a>
                                                        </div>

                                                        <div className="font-sans">
                                                            <p className="text-[9px] text-gray-500 uppercase tracking-widest">Tipe Rumah</p>
                                                            <p className="text-xs font-bold text-white">{req.houseName}</p>
                                                        </div>

                                                        {/* SELECTIONS */}
                                                        <div className="space-y-1">
                                                            <p className="text-[9px] text-gray-500 uppercase tracking-widest font-sans">Pilihan Desain Per Ruangan</p>
                                                            <div className="grid grid-cols-2 gap-1.5 max-h-32 overflow-y-auto pr-1">
                                                                {Object.entries(req.selections).map(([slotId, dObj]) => (
                                                                    <div key={slotId} className="bg-dark-300/50 p-1.5 rounded text-[10px] font-sans">
                                                                        <span className="block text-[8px] text-gold-500 font-bold uppercase">{slotId.replace('-', ' ')}</span>
                                                                        <span className="text-white font-medium">{dObj.name}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>

                                                        {req.operatorDesign && (
                                                            <div className="bg-gold-500/5 p-2 rounded-lg border border-gold-500/10 space-y-1.5">
                                                                <span className="text-[8px] text-gold-500 font-bold uppercase font-sans">Custom Desain Operator</span>
                                                                {req.operatorDesign.image && (
                                                                    <img src={req.operatorDesign.image} className="h-20 w-full object-cover rounded" />
                                                                )}
                                                                <p className="text-[10px] text-gray-300 font-sans italic">"{req.operatorDesign.note}"</p>
                                                            </div>
                                                        )}
                                                    </div>

                                                    <div className="space-y-3 border-t border-gray-800 pt-3">
                                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                                                            <span className="text-[10px] text-gray-500 font-sans">Ganti Status:</span>
                                                            <div className="flex flex-wrap gap-1">
                                                                {['Menunggu', 'Diproses', 'Disetujui', 'Ditolak', 'Selesai'].map(st => (
                                                                    <button 
                                                                        key={st}
                                                                        onClick={() => updateRequestStatus(req.id, st)}
                                                                        className={`px-2 py-0.5 rounded text-[8px] font-bold uppercase transition-all font-sans ${
                                                                            req.status === st ? 'bg-gold-500 text-dark-400' : 'bg-dark-300 text-gray-500 border border-gray-800'
                                                                        }`}
                                                                    >
                                                                        {st}
                                                                    </button>
                                                                ))}
                                                            </div>
                                                        </div>

                                                        <form onSubmit={(e) => {
                                                            e.preventDefault();
                                                            const fData = new FormData(e.target);
                                                            updateRequestNote(req.id, fData.get('respNote'));
                                                        }} className="space-y-1.5">
                                                            <Input label="Catatan Tanggapan Operator" name="respNote" placeholder="Tulis instruksi tindak lanjut..." defaultValue={req.note} />
                                                            <button type="submit" className="w-full bg-gradient-gold text-dark-400 font-bold py-1.5 rounded text-[10px] tracking-wider uppercase font-sans">
                                                                Simpan Catatan
                                                            </button>
                                                        </form>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* TAB 2: KELOLA BERANDA & BRANDING */}
                            {dashboardTab === 'beranda' && (
                                <div className="space-y-6 animate-fade-in">
                                    <div className="glass-panel p-5 md:p-6 rounded-2xl border-gold-500/10 space-y-6">
                                        <div className="border-b border-gold-500/15 pb-3">
                                            <h2 className="font-serif text-xl font-bold text-gold-500">Kelola Beranda Utama</h2>
                                            <p className="text-xs text-gray-400 font-sans">Atur visual teks, banner, dan slider otomatis halaman awal.</p>
                                        </div>

                                        <form onSubmit={(e) => {
                                            e.preventDefault();
                                            triggerAlert('Konfigurasi Beranda telah disimpan secara realtime!');
                                        }} className="space-y-5">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <Input label="Nama Perusahaan" value={appState.companyName} onChange={(e) => updateCMSState('companyName', e.target.value)} />
                                                <Input label="Slogan Utama" value={appState.slogan} onChange={(e) => updateCMSState('slogan', e.target.value)} />
                                            </div>
                                            
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div className="space-y-1.5">
                                                    <label className="block text-[10px] font-semibold text-gold-500 uppercase tracking-widest font-sans">Banner Utama Hero</label>
                                                    <ImageUpload 
                                                        onImageSelected={(img) => {
                                                            updateCMSState('heroImage', img);
                                                            handleAddToCentralGallery(img, 'Banner');
                                                        }} 
                                                        currentImage={appState.heroImage} 
                                                        label="Pilih dari File"
                                                    />
                                                </div>
                                                <div className="space-y-1.5">
                                                    <label className="block text-[10px] font-semibold text-gold-500 uppercase tracking-widest font-sans">Logo Perusahaan (Ganti / Unggah)</label>
                                                    <ImageUpload 
                                                        onImageSelected={(img) => {
                                                            updateCMSState('logo', img);
                                                            handleAddToCentralGallery(img, 'Banner');
                                                            triggerAlert('Logo berhasil diperbarui.');
                                                        }} 
                                                        currentImage={appState.logo} 
                                                        label="Pilih dari Galeri"
                                                    />
                                                </div>
                                            </div>

                                            <button type="submit" className="bg-gradient-gold text-dark-400 font-bold py-2 px-4 rounded-lg text-xs tracking-wider uppercase font-sans">
                                                Simpan Perubahan Beranda
                                            </button>
                                        </form>
                                    </div>

                                    {/* ATURAN BRANDING LOGO & TEKS */}
                                    <div className="glass-panel p-5 md:p-6 rounded-2xl border-gold-500/10 space-y-6">
                                        <div className="border-b border-gold-500/15 pb-2">
                                            <h3 className="font-serif text-lg font-bold text-gold-500">Aturan Branding & Logo Perusahaan</h3>
                                            <p className="text-xs text-gray-400 font-sans mt-1">
                                                Nama perusahaan "PT.MIA" akan selalu muncul mendampingi logo. Konfigurasikan gaya, ukuran, dan jaraknya di bawah ini.
                                            </p>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-4">
                                                <Input 
                                                    label="Style Preset PT.MIA" 
                                                    type="select" 
                                                    value={appState.brandingStyle}

                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* TAB 10: PENGATURAN PASSWORD */}
                            {dashboardTab === 'password-settings' && (
                                <div className="glass-panel p-5 md:p-6 rounded-2xl border-gold-500/10 space-y-6 animate-fade-in">
                                    <div className="border-b border-gold-500/15 pb-3">
                                        <h2 className="font-serif text-xl font-bold text-gold-500">Pengaturan Password Operator</h2>
                                        <p className="text-xs text-gray-400 font-sans">Amankan otorisasi admin perumahan PT.MIA dengan merotasi kata sandi lama.</p>
                                    </div>

                                    <form onSubmit={handlePasswordChangeSubmit} className="max-w-md space-y-4">
                                        <div className="relative">
                                            <Input 
                                                label="Password Lama Saat Ini" 
                                                type={showOld ? "text" : "password"}
                                                value={passwords.old}
                                                onChange={(e) => setPasswords({...passwords, old: e.target.value})}
                                                placeholder="Ketik kata sandi lama..." 
                                                required 
                                            />
                                            <button 
                                                type="button" 
                                                onClick={() => setShowOld(!showOld)} 
                                                className="absolute right-3 bottom-3 text-gold-500 hover:text-white text-xs transition-colors"
                                            >
                                                <i className={`fas ${showOld ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                            </button>
                                        </div>

                                        <div className="relative">
                                            <Input 
                                                label="Password Baru" 
                                                type={showNext ? "text" : "password"}
                                                value={passwords.next}
                                                onChange={(e) => setPasswords({...passwords, next: e.target.value})}
                                                placeholder="Minimal 6 karakter..." 
                                                required 
                                            />
                                            <button 
                                                type="button" 
                                                onClick={() => setShowNext(!showNext)} 
                                                className="absolute right-3 bottom-3 text-gold-500 hover:text-white text-xs transition-colors"
                                            >
                                                <i className={`fas ${showNext ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                            </button>
                                        </div>

                                        <div className="relative">
                                            <Input 
                                                label="Konfirmasi Password Baru" 
                                                type={showConfirm ? "text" : "password"}
                                                value={passwords.confirm}
                                                onChange={(e) => setPasswords({...passwords, confirm: e.target.value})}
                                                placeholder="Ulangi kata sandi baru..." 
                                                required 
                                            />
                                            <button 
                                                type="button" 
                                                onClick={() => setShowConfirm(!showConfirm)} 
                                                className="absolute right-3 bottom-3 text-gold-500 hover:text-white text-xs transition-colors"
                                            >
                                                <i className={`fas ${showConfirm ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                            </button>
                                        </div>

                                        <button type="submit" className="bg-gradient-gold text-dark-400 font-bold py-2 px-5 rounded-lg text-xs tracking-wider uppercase font-sans transition-all hover:shadow-[0_0_15px_rgba(212,175,55,0.4)]">
                                            Ganti Kata Sandi
                                        </button>
                                    </form>
                                </div>
                            )}

                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
